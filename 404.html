<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
  <script>
    (function () {
      var path = window.location.pathname.replace(/\/+$/, "");
      if (path.toLowerCase() === "/ahterms") {
        window.location.replace("/ahTerms/" + window.location.search + window.location.hash);
      }
    }());
  </script>
</head>
<body>
  <p>Page not found.</p>
</body>
</html>
